name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  # Pinned for reproducibility: `latest` drifts, so a new release can fail a
  # previously-green CI (and disagree with local). Bump deliberately, and run the
  # same version locally. This release is built with Go >= 1.26, so its prebuilt
  # binary loads this `go 1.26` module.
  GOLANGCI_LINT_VERSION: v2.12.2
  # Pinned for reproducibility (same rationale) — bump deliberately.
  HELM_VERSION: v4.2.0
  KUBECONFORM_VERSION: v0.8.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # bsdtar (libarchive) is the CAB writer's conformance oracle; without it
      # those round-trip tests skip. Installing it exercises real CAB validation.
      - name: Install libarchive-tools (bsdtar)
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install golangci-lint
        run: |
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check formatting (golangci-lint fmt)
        run: |
          golangci-lint fmt ./...
          git diff --exit-code

  image:
    # Build and push the container image with ko, only after CI passes and only
    # on pushes (main + version tags) — pull requests have no registry creds.
    needs: [test, lint, format]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: keyless cosign signing + attestation
      attestations: write # write the build-provenance attestation
    env:
      # bare uses this as the exact image name -> docker.io/<namespace>/<repo>.
      KO_DOCKER_REPO: docker.io/bosiakov/debugsymd
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: ko-build/setup-ko@v0.9

      - uses: sigstore/cosign-installer@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tags="sha-${GITHUB_SHA::12}"
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            tags="latest,${tags}"
          fi
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tags="${GITHUB_REF_NAME},${tags}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build & push (ko)
        id: build
        run: |
          # ko prints the pushed image reference by digest (and attaches an SPDX
          # SBOM by default). Capture the immutable digest ref for signing.
          ref="$(ko build --bare -t "${{ steps.tags.outputs.tags }}" --platform=linux/amd64,linux/arm64 .)"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "digest=${ref##*@}" >> "$GITHUB_OUTPUT"

      - name: Sign image (keyless, by digest)
        # No keys: cosign uses the workflow's OIDC identity (Fulcio cert + Rekor
        # transparency log). Signing the @sha256 digest, never a mutable tag.
        run: cosign sign --yes "${{ steps.build.outputs.ref }}"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.KO_DOCKER_REPO }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  chart-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: helm lint
        run: helm lint charts/debugsymd --set s3.bucket=ci-validation

      - name: Validate rendered manifests (kubeconform)
        run: |
          curl -fsSLo kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          # Render with the optional features on so their templates are covered.
          # -ignore-missing-schemas skips CRDs without published schemas (the
          # ServiceMonitor); core types are still strictly validated.
          helm template ci charts/debugsymd \
            --set s3.bucket=ci-validation \
            --set serviceMonitor.enabled=true \
            --set networkPolicy.enabled=true \
            --set ingress.enabled=true \
            | ./kubeconform -strict -summary -ignore-missing-schemas

  chart-publish:
    # Package and push the chart as an OCI artifact to Docker Hub, only after the
    # chart validates and only on pushes (main + version tags) — PRs have no
    # registry creds.
    needs: [chart-lint]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: keyless cosign signing + provenance attestation
      attestations: write # write the build-provenance attestation
    env:
      OCI_REPO: oci://registry-1.docker.io/bosiakov
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - uses: sigstore/cosign-installer@v3

      # cosign reads ~/.docker/config.json; helm registry login writes Helm's
      # own store, so cosign needs its own Docker login to push the signature.
      - name: Log in to Docker Hub (cosign)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub (Helm OCI)
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Compute chart and app versions
        id: ver
        run: |
          # Chart.yaml holds the base SemVer. Tags publish a clean release
          # version; main publishes a prerelease (-dev.<sha>) so it never
          # clobbers a released version. appVersion mirrors the image tag scheme.
          base="$(helm show chart charts/debugsymd | awk '/^version:/{print $2}')"
          app="sha-${GITHUB_SHA::12}"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            chart="${GITHUB_REF_NAME#v}"
            app="$GITHUB_REF_NAME"
          else
            chart="${base}-dev.${GITHUB_SHA::12}"
          fi
          echo "chart=${chart}" >> "$GITHUB_OUTPUT"
          echo "app=${app}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        id: pkg
        run: |
          helm package charts/debugsymd \
            --version "${{ steps.ver.outputs.chart }}" \
            --app-version "${{ steps.ver.outputs.app }}" \
            --destination dist
          echo "package=$(ls dist/*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Push chart (OCI) and capture digest
        id: push
        run: |
          # helm push prints "Digest: sha256:..." on success; capture it to sign
          # the immutable artifact rather than a mutable tag.
          out="$(helm push "${{ steps.pkg.outputs.package }}" "${OCI_REPO}" 2>&1)"
          echo "$out"
          echo "digest=$(echo "$out" | awk '/Digest:/{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Sign chart (keyless, by digest)
        # Sign via the docker.io alias, not registry-1.docker.io: the Docker
        # login stores creds under index.docker.io, which cosign resolves from
        # docker.io but not from the registry-1 host (-> UNAUTHORIZED). Same
        # repo and digest either way.
        run: cosign sign --yes "docker.io/bosiakov/debugsymd@${{ steps.push.outputs.digest }}"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: docker.io/bosiakov/debugsymd
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
