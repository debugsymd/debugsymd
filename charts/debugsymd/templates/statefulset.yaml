{{- include "debugsymd.validate" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "debugsymd.fullname" . }}
  labels:
    {{- include "debugsymd.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "debugsymd.headlessName" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "debugsymd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "debugsymd.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "debugsymd.serviceAccountName" . }}
      automountServiceAccountToken: {{ include "debugsymd.automountToken" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- if .Values.initChown.enabled }}
      initContainers:
        - name: cache-perms
          image: {{ .Values.initChown.image }}
          command: ["sh", "-c", "chown -R 65532:65532 {{ .Values.cache.dir }}"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [CHOWN, FOWNER, DAC_OVERRIDE]
          volumeMounts:
            - name: cache
              mountPath: {{ .Values.cache.dir }}
      {{- end }}
      containers:
        - name: debugsymd
          image: {{ include "debugsymd.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- include "debugsymd.args" . | nindent 12 }}
          ports:
            - name: public
              containerPort: {{ regexReplaceAll "^.*:" .Values.bind "" | int }}
              protocol: TCP
            - name: admin
              containerPort: {{ regexReplaceAll "^.*:" .Values.admin "" | int }}
              protocol: TCP
          env:
            {{- $region := include "debugsymd.awsRegion" . }}
            {{- with $region }}
            - name: AWS_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if include "debugsymd.sentrySecretName" . }}
            - name: SENTRY_AUTH_TOKEN_FILE
              value: /secrets/sentry/{{ .Values.sentry.token.key }}
            {{- end }}
            {{- if .Values.aws.credentials.existingSecret }}
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /secrets/aws/{{ .Values.aws.credentials.key }}
            {{- end }}
            {{- with include "debugsymd.goMemLimit" . }}
            - name: GOMEMLIMIT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.goRuntime.maxProcs }}
            - name: GOMAXPROCS
              value: {{ . | quote }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: {{ .Values.cache.dir }}
            {{- if include "debugsymd.sentrySecretName" . }}
            - name: sentry-token
              mountPath: /secrets/sentry
              readOnly: true
            {{- end }}
            {{- if .Values.aws.credentials.existingSecret }}
            - name: aws-credentials
              mountPath: /secrets/aws
              readOnly: true
            {{- end }}
      volumes:
        {{- if not .Values.persistence.enabled }}
        - name: cache
          emptyDir: {}
        {{- end }}
        {{- if include "debugsymd.sentrySecretName" . }}
        - name: sentry-token
          secret:
            secretName: {{ include "debugsymd.sentrySecretName" . }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.aws.credentials.existingSecret }}
        - name: aws-credentials
          secret:
            secretName: {{ .Values.aws.credentials.existingSecret }}
            defaultMode: 0400
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache
        labels:
          {{- include "debugsymd.labels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        {{- if (eq "-" .Values.persistence.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        {{- end }}
  {{- end }}
