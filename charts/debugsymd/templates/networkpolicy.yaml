{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "debugsymd.fullname" . }}
  labels:
    {{- include "debugsymd.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "debugsymd.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Public symstore + debuginfod port.
    - ports:
        - port: public
          protocol: TCP
      {{- with .Values.networkPolicy.publicIngress }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    # Admin port (/healthz, /readyz, /metrics). Defaults to same-namespace only.
    - ports:
        - port: admin
          protocol: TCP
      from:
        {{- with .Values.networkPolicy.adminIngress }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        - podSelector: {}
        {{- end }}
{{- end }}
