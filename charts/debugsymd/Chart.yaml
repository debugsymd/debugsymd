apiVersion: v2
name: debugsymd
description: |-
  Symbol-serving daemon that speaks the Microsoft SymStore and debuginfod
  protocols, backed by S3 with an on-disk regenerable cache.
type: application

# Chart version — bump on every chart change (SemVer).
version: 0.1.0

# appVersion tracks the debugsymd image tag. The published image is
# docker.io/bosiakov/debugsymd, tagged `latest` and `sha-<12>`. Pin to an
# immutable sha-<12> tag in production via image.tag.
appVersion: "latest"

home: https://github.com/debugsymd/debugsymd
sources:
  - https://github.com/debugsymd/debugsymd
keywords:
  - debuginfod
  - symstore
  - symbols
  - sentry
maintainers:
  - name: debugsymd
